<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="board" width="150" height="150" patternUnits="userSpaceOnUse">
      <rect width="75" height="75" x="0"  y="0"  fill="#f0d9b5"/>
      <rect width="75" height="75" x="75" y="0"  fill="#b58863"/>
      <rect width="75" height="75" x="0"  y="75" fill="#b58863"/>
      <rect width="75" height="75" x="75" y="75" fill="#f0d9b5"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <mask id="fadeMask">
      <rect width="1200" height="630" fill="url(#fade)"/>
    </mask>
  </defs>

  <rect width="1200" height="630" fill="#ffffff"/>
  <g mask="url(#fadeMask)" opacity="0.35">
    <rect x="700" y="0" width="500" height="630" fill="url(#board)"/>
  </g>

  <g transform="translate(80 220)">
    <rect width="88" height="88" rx="18" fill="#18181b"/>
    <g fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" transform="translate(14 14) scale(2.5)">
      <path d="M8 21h8"/>
      <path d="M12 21v-4"/>
      <path d="M15.5 11V6l2 1V3h-4v2l-1-1-1 1V3H7.5v4l2-1v5"/>
      <path d="M17 17h-9l1.5-6h6L17 17Z"/>
    </g>
  </g>

  <text x="80" y="385" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="96" font-weight="800" fill="#18181b" letter-spacing="-3">ChessPublica</text>
  <text x="80" y="440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="36" font-weight="500" fill="#52525b">Minimal Chess Publishing Engine</text>
  <text x="80" y="500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="28" font-weight="400" fill="#71717a">FEN · PGN · Puzzles · Interactive Studies</text>
