name: Rebuild dist

on:
  push:
    branches: [main]
    paths:
      - 'assets/**'
      - 'build.js'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write

concurrency:
  group: rebuild-dist-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build dist
        run: npm run build

      - name: Commit regenerated dist
        run: |
          if git diff --quiet -- dist/; then
            echo "dist/ already up to date — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/
          git commit -m "chore: auto-rebuild dist [skip ci]"
          git push
